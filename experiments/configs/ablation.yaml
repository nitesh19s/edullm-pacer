experiment_id: pacer_ablation_v1
description: >
  Ablation study: isolate contribution of router and boundary post-processor.
  Uses best embedding model (bge-large) and no generator (retrieval-only).
  Four conditions: full PACER, no router, no boundary, neither.

conditions:

  # Full PACER
  - name: PACER-Full
    mode: adaptive
    chunk_size: 2000
    chunk_overlap: 100
    max_unit_chars: 4000
    use_boundary_pp: true
    use_router: true
    retriever: hybrid

  # A1: Router OFF — always use educational chunker; boundary pp still ON
  - name: A1-NoRouter
    mode: adaptive
    chunk_size: 2000
    chunk_overlap: 100
    max_unit_chars: 4000
    use_boundary_pp: true
    use_router: false   # classifier/router disabled → always educational
    retriever: hybrid

  # A2: Boundary OFF — adaptive routing ON; boundary pp OFF
  - name: A2-NoBoundary
    mode: adaptive
    chunk_size: 2000
    chunk_overlap: 100
    max_unit_chars: 4000
    use_boundary_pp: false
    use_router: true
    retriever: hybrid

  # A3: NoCAS — no CAS scoring pass (same chunking as full PACER; used in analysis)
  - name: A3-NoCAS
    mode: adaptive
    chunk_size: 2000
    chunk_overlap: 100
    max_unit_chars: 4000
    use_boundary_pp: true
    use_router: true
    retriever: hybrid
    extra: {skip_cas: true}

embedding_models:
  - BAAI/bge-large-en-v1.5

generator_models:
  - meta-llama/Llama-3.1-8B-Instruct

benchmark_path: data/processed/benchmark.jsonl
documents_db_path: data/db/edullm-database.db
output_dir: experiments/results

top_k: 10
k_values: [1, 3, 5, 10]
seed: 42
