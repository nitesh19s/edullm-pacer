<!DOCTYPE html>
<html>
<head>
    <title>Test RAG Now</title>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: Arial, sans-serif; color: white; }
        .container { max-width: 800px; margin: 50px auto; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 15px; padding: 40px; }
        h1 { text-align: center; font-size: 2.5em; margin-bottom: 10px; }
        button { background: #48bb78; color: #000; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; width: 100%; margin: 10px 0; }
        button:hover { background: #38a169; }
        .result { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 8px; margin: 20px 0; min-height: 100px; font-family: monospace; font-size: 14px; }
        .success { color: #48bb78; }
        .error { color: #f56565; }
        .warning { color: #ed8936; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 RAG Quick Test</h1>
        <p style="text-align: center; color: #a0aec0;">Test your RAG system in one click</p>

        <button onclick="window.open('index.html', '_blank')" style="background: #4299e1;">1. Open Main Platform</button>
        <button onclick="runTest()" style="background: #48bb78; font-size: 24px; padding: 20px;">2. RUN TEST</button>
        <button onclick="clearAndReset()" style="background: #f56565;">3. Clear & Reset (if broken)</button>

        <div id="result" class="result">
            <div class="warning">Click "RUN TEST" after opening main platform...</div>
        </div>
    </div>

    <script>
        function log(msg, type = 'info') {
            const el = document.getElementById('result');
            const div = document.createElement('div');
            div.className = type;
            div.textContent = msg;
            el.appendChild(div);
        }

        async function runTest() {
            document.getElementById('result').innerHTML = '';
            log('Starting test...', 'info');

            const history = JSON.parse(localStorage.getItem('upload_history') || '[]');
            const uploads = history.filter(h => h.status === 'success');

            log(`Uploads: ${uploads.length}`, uploads.length > 0 ? 'success' : 'error');

            if (!window.vectorStore) {
                log('Vector store not loaded - open index.html first!', 'error');
                return;
            }

            const items = window.vectorStore.items?.length || 0;
            log(`Vector store: ${items} items`, items > 0 ? 'success' : 'error');

            if (items === 0) {
                log('FIX: Click "Integrate Data" in main platform', 'warning');
                return;
            }

            log('RAG system working!', 'success');
        }

        function clearAndReset() {
            localStorage.clear();
            log('Cleared! Refresh and re-upload PDFs', 'success');
        }
    </script>
</body>
</html>
