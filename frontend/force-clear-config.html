<!DOCTYPE html>
<html>
<head>
    <title>Clear Configuration</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #00ff00; }
        h1 { color: #00ff00; }
        pre { background: #000; padding: 20px; border-radius: 5px; }
        .success { color: #00ff00; }
        .warning { color: #ffaa00; }
    </style>
</head>
<body>
    <h1>🧹 Clearing All LLM Configurations...</h1>
    <pre id="output"></pre>

    <script>
        const output = document.getElementById('output');

        function log(msg) {
            output.textContent += msg + '\n';
            console.log(msg);
        }

        log('🧹 Starting configuration cleanup...\n');

        // Get all localStorage keys
        const allKeys = Object.keys(localStorage);
        log('Found ' + allKeys.length + ' localStorage items\n');

        // Keys to remove
        const toRemove = [
            'llm_config',
            'llm_service_config',
            'enhanced_llm_config',
            'openai_config',
            'rag_config',
            'vector_store_config'
        ];

        let removed = 0;

        toRemove.forEach(key => {
            if (localStorage.getItem(key)) {
                const value = localStorage.getItem(key);
                log('Found: ' + key);
                log('  Value: ' + value.substring(0, 100) + '...');
                localStorage.removeItem(key);
                log('  ✅ Removed\n');
                removed++;
            }
        });

        // Also clear any key containing 'gpt-4-turbo-preview'
        allKeys.forEach(key => {
            try {
                const value = localStorage.getItem(key);
                if (value && value.includes && value.includes('gpt-4-turbo-preview')) {
                    log('Found old config in: ' + key);
                    log('  Contains: gpt-4-turbo-preview');
                    localStorage.removeItem(key);
                    log('  ✅ Removed\n');
                    removed++;
                }
            } catch (e) {
                // Skip non-string values
            }
        });

        log('\n✅ Configuration cleanup complete!');
        log('📊 Removed ' + removed + ' configuration items');
        log('💡 Close this tab and refresh your main application.');
        log('🎯 System will now use local Ollama models by default.');
    </script>
</body>
</html>
