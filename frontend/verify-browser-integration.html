<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local RAG System - Browser Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .content {
            padding: 2rem;
        }

        .test-section {
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: #f8f9fa;
            border-radius: 0.5rem;
            border-left: 4px solid #667eea;
        }

        .test-section h2 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }

        .test-item {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: white;
            border-radius: 0.25rem;
            border: 1px solid #e0e0e0;
        }

        .status {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            margin-right: 1rem;
            flex-shrink: 0;
        }

        .status.pending {
            background: #ffc107;
            animation: pulse 2s infinite;
        }

        .status.passed {
            background: #28a745;
        }

        .status.failed {
            background: #dc3545;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .test-label {
            flex: 1;
            font-weight: 500;
            color: #333;
        }

        .test-result {
            font-size: 0.9rem;
            color: #666;
            font-family: 'Courier New', monospace;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        button {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .log-section {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #1e1e1e;
            border-radius: 0.5rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .log-entry {
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            padding: 0.25rem 0;
        }

        .log-entry.success { color: #4ade80; }
        .log-entry.error { color: #ef4444; }
        .log-entry.info { color: #60a5fa; }
        .log-entry.warning { color: #fbbf24; }

        .summary {
            margin-top: 2rem;
            padding: 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 0.5rem;
            color: white;
            text-align: center;
        }

        .summary h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .summary .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 1rem;
        }

        .summary .stat {
            text-align: center;
        }

        .summary .stat-value {
            font-size: 2rem;
            font-weight: bold;
        }

        .summary .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 Local RAG System Verification</h1>
            <p>Browser Integration Test Suite</p>
        </div>

        <div class="content">
            <!-- Test Section 1: Services -->
            <div class="test-section">
                <h2>📦 1. Service Loading</h2>
                <div id="test-services"></div>
            </div>

            <!-- Test Section 2: Initialization -->
            <div class="test-section">
                <h2>🚀 2. Service Initialization</h2>
                <div id="test-init"></div>
            </div>

            <!-- Test Section 3: Ollama Tests -->
            <div class="test-section">
                <h2>🤖 3. Ollama Integration</h2>
                <div id="test-ollama"></div>
            </div>

            <!-- Test Section 4: Functionality -->
            <div class="test-section">
                <h2>⚡ 4. Core Functionality</h2>
                <div id="test-functionality"></div>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button class="btn-primary" onclick="runAllTests()" id="runBtn">
                    🧪 Run All Tests
                </button>
                <button class="btn-secondary" onclick="clearLogs()">
                    🗑️ Clear Logs
                </button>
                <button class="btn-secondary" onclick="location.href='index.html'">
                    🏠 Go to Platform
                </button>
            </div>

            <!-- Console Log -->
            <div class="log-section">
                <div id="console-log"></div>
            </div>

            <!-- Summary -->
            <div class="summary" id="summary" style="display:none;">
                <h3>Test Results</h3>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="passed-count">0</div>
                        <div class="stat-label">Passed</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="failed-count">0</div>
                        <div class="stat-label">Failed</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="total-count">0</div>
                        <div class="stat-label">Total</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let testResults = { passed: 0, failed: 0, total: 0 };

        function log(message, type = 'info') {
            const logDiv = document.getElementById('console-log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateTestItem(id, status, result = '') {
            const item = document.getElementById(id);
            if (item) {
                const statusEl = item.querySelector('.status');
                const resultEl = item.querySelector('.test-result');
                statusEl.className = `status ${status}`;
                if (resultEl && result) {
                    resultEl.textContent = result;
                }
            }
        }

        function createTestItem(containerId, id, label) {
            const container = document.getElementById(containerId);
            const item = document.createElement('div');
            item.className = 'test-item';
            item.id = id;
            item.innerHTML = `
                <div class="status pending"></div>
                <div class="test-label">${label}</div>
                <div class="test-result"></div>
            `;
            container.appendChild(item);
        }

        function initTests() {
            // Service Loading Tests
            createTestItem('test-services', 'test-ollama-service', 'Ollama Service');
            createTestItem('test-services', 'test-transformers-service', 'Transformers.js Service');
            createTestItem('test-services', 'test-model-manager', 'Model Manager');
            createTestItem('test-services', 'test-rag-orchestrator', 'RAG Orchestrator');
            createTestItem('test-services', 'test-vector-store', 'Vector Store');

            // Initialization Tests
            createTestItem('test-init', 'test-init-ollama', 'Initialize Ollama');
            createTestItem('test-init', 'test-init-manager', 'Initialize Model Manager');
            createTestItem('test-init', 'test-init-rag', 'Initialize RAG Pipeline');

            // Ollama Tests
            createTestItem('test-ollama', 'test-ollama-connect', 'Ollama Connection');
            createTestItem('test-ollama', 'test-ollama-models', 'Available Models');

            // Functionality Tests
            createTestItem('test-functionality', 'test-text-gen', 'Text Generation');
            createTestItem('test-functionality', 'test-embeddings', 'Embedding Generation');
            createTestItem('test-functionality', 'test-rag-pipeline', 'Full RAG Pipeline');
        }

        async function runAllTests() {
            const runBtn = document.getElementById('runBtn');
            runBtn.disabled = true;
            runBtn.textContent = '⏳ Running Tests...';

            testResults = { passed: 0, failed: 0, total: 0 };
            log('Starting comprehensive test suite...', 'info');

            try {
                await testServiceLoading();
                await testInitialization();
                await testOllamaIntegration();
                await testFunctionality();

                log('All tests completed!', 'success');
                showSummary();
            } catch (error) {
                log(`Test suite error: ${error.message}`, 'error');
            } finally {
                runBtn.disabled = false;
                runBtn.textContent = '🔄 Run Again';
            }
        }

        async function testServiceLoading() {
            log('Testing service loading...', 'info');

            const services = [
                ['test-ollama-service', 'localOllamaService', 'Ollama Service'],
                ['test-transformers-service', 'localTransformersService', 'Transformers Service'],
                ['test-model-manager', 'localModelManager', 'Model Manager'],
                ['test-rag-orchestrator', 'ragOrchestrator', 'RAG Orchestrator'],
                ['test-vector-store', 'enhancedVectorStore', 'Vector Store']
            ];

            for (const [id, serviceName, label] of services) {
                testResults.total++;
                if (window[serviceName]) {
                    updateTestItem(id, 'passed', '✓ Loaded');
                    log(`✓ ${label} loaded`, 'success');
                    testResults.passed++;
                } else {
                    updateTestItem(id, 'failed', '✗ Not found');
                    log(`✗ ${label} not found`, 'error');
                    testResults.failed++;
                }
            }
        }

        async function testInitialization() {
            log('Testing service initialization...', 'info');

            // Test Ollama init
            testResults.total++;
            try {
                if (window.localOllamaService) {
                    const result = await window.localOllamaService.initialize();
                    if (result) {
                        updateTestItem('test-init-ollama', 'passed', '✓ Initialized');
                        log('✓ Ollama service initialized', 'success');
                        testResults.passed++;
                    } else {
                        throw new Error('Not available');
                    }
                }
            } catch (error) {
                updateTestItem('test-init-ollama', 'failed', `✗ ${error.message}`);
                log(`✗ Ollama init failed: ${error.message}`, 'warning');
                testResults.failed++;
            }

            // Test Model Manager init
            testResults.total++;
            try {
                if (window.localModelManager) {
                    await window.localModelManager.initialize();
                    const provider = window.localModelManager.getActiveProvider();
                    updateTestItem('test-init-manager', 'passed', `✓ ${provider}`);
                    log(`✓ Model Manager initialized (provider: ${provider})`, 'success');
                    testResults.passed++;
                }
            } catch (error) {
                updateTestItem('test-init-manager', 'failed', `✗ ${error.message}`);
                log(`✗ Model Manager init failed: ${error.message}`, 'error');
                testResults.failed++;
            }

            // Test RAG init
            testResults.total++;
            try {
                if (window.ragOrchestrator) {
                    await window.ragOrchestrator.initialize();
                    updateTestItem('test-init-rag', 'passed', '✓ Ready');
                    log('✓ RAG Orchestrator initialized', 'success');
                    testResults.passed++;
                }
            } catch (error) {
                updateTestItem('test-init-rag', 'failed', `✗ ${error.message}`);
                log(`✗ RAG init failed: ${error.message}`, 'error');
                testResults.failed++;
            }
        }

        async function testOllamaIntegration() {
            log('Testing Ollama integration...', 'info');

            // Test connection
            testResults.total++;
            try {
                const response = await fetch('http://localhost:11434/api/tags');
                if (response.ok) {
                    const data = await response.json();
                    updateTestItem('test-ollama-connect', 'passed', '✓ Connected');
                    log(`✓ Ollama connected (${data.models.length} models)`, 'success');
                    testResults.passed++;

                    // Test models
                    testResults.total++;
                    const models = data.models.map(m => m.name).join(', ');
                    updateTestItem('test-ollama-models', 'passed', `${data.models.length} available`);
                    log(`✓ Models: ${models}`, 'success');
                    testResults.passed++;
                } else {
                    throw new Error('Not responding');
                }
            } catch (error) {
                updateTestItem('test-ollama-connect', 'failed', '✗ Failed');
                log(`✗ Ollama connection failed: ${error.message}`, 'error');
                testResults.failed += 2;
            }
        }

        async function testFunctionality() {
            log('Testing core functionality...', 'info');

            // Test text generation
            testResults.total++;
            try {
                log('Generating text...', 'info');
                const response = await window.localModelManager.generateText(
                    "Say hello in one word.",
                    { maxTokens: 10, temperature: 0.1 }
                );
                updateTestItem('test-text-gen', 'passed', `✓ ${response.provider}`);
                log(`✓ Text generated: "${response.content}"`, 'success');
                testResults.passed++;
            } catch (error) {
                updateTestItem('test-text-gen', 'failed', `✗ ${error.message}`);
                log(`✗ Text generation failed: ${error.message}`, 'error');
                testResults.failed++;
            }

            // Test embeddings
            testResults.total++;
            try {
                log('Generating embedding...', 'info');
                const embedding = await window.localModelManager.generateEmbedding("test");
                updateTestItem('test-embeddings', 'passed', `✓ ${embedding.length}-dim`);
                log(`✓ Embedding generated: ${embedding.length} dimensions`, 'success');
                testResults.passed++;
            } catch (error) {
                updateTestItem('test-embeddings', 'failed', `✗ ${error.message}`);
                log(`✗ Embedding generation failed: ${error.message}`, 'error');
                testResults.failed++;
            }

            // Test RAG pipeline
            testResults.total++;
            try {
                log('Testing RAG pipeline...', 'info');

                // Add document
                await window.enhancedVectorStore.addDocument(
                    "Photosynthesis is the process by which plants convert light energy into chemical energy.",
                    { title: "Test Doc", subject: "Biology", collection: "test-verify" }
                );

                // Generate answer
                const result = await window.ragOrchestrator.generateAnswer(
                    "What is photosynthesis?",
                    { collection: "test-verify" }
                );

                updateTestItem('test-rag-pipeline', 'passed', `✓ ${result.confidence}`);
                log(`✓ RAG pipeline working (confidence: ${result.confidence})`, 'success');
                testResults.passed++;
            } catch (error) {
                updateTestItem('test-rag-pipeline', 'failed', `✗ ${error.message}`);
                log(`✗ RAG pipeline failed: ${error.message}`, 'error');
                testResults.failed++;
            }
        }

        function showSummary() {
            const summary = document.getElementById('summary');
            document.getElementById('passed-count').textContent = testResults.passed;
            document.getElementById('failed-count').textContent = testResults.failed;
            document.getElementById('total-count').textContent = testResults.total;
            summary.style.display = 'block';

            if (testResults.failed === 0) {
                log('🎉 ALL TESTS PASSED! System is fully operational.', 'success');
            } else {
                log(`⚠️ ${testResults.failed} test(s) failed. Check details above.`, 'warning');
            }
        }

        function clearLogs() {
            document.getElementById('console-log').innerHTML = '';
            document.getElementById('summary').style.display = 'none';
        }

        // Initialize on load
        window.addEventListener('load', () => {
            initTests();
            log('Test suite ready. Click "Run All Tests" to begin.', 'info');
        });
    </script>
</body>
</html>
